<div
  class="option-cursor-wrapper"
  [class.cursor-not-allowed]="getOptionCursor() === 'not-allowed'"
  [attr.data-option-id]="binding().option.optionId"
>
  @if (type() === 'single') {
    <mat-radio-button
      class="option-row single-option"
      appHighlightOption
      [sharedOptionConfig]="sharedOptionConfig()"
      [optionBinding]="binding()"
      [value]="displayIndex()"
      [ngClass]="getOptionClasses()"
      [style.background-color]="getOptionBackgroundColor()"
      [disabled]="isDisabled()"
      [disableRipple]="true"
      (change)="onChanged($event)"
      [attr.data-option-id]="binding().option.optionId"
    >
      <ng-container *ngTemplateOutlet="optionContent"></ng-container>
    </mat-radio-button>
  } @else {
    <mat-checkbox
      class="option-row multiple-option"
      appHighlightOption
      [sharedOptionConfig]="sharedOptionConfig()"
      [optionBinding]="binding()"
      [checked]="binding().isSelected"
      [ngClass]="getOptionClasses()"
      [style.background-color]="getOptionBackgroundColor()"
      [disabled]="isDisabled()"
      [disableRipple]="true"
      (change)="onChanged($event)"
      [attr.data-option-id]="binding().option.optionId"
    >
      <ng-container *ngTemplateOutlet="optionContent"></ng-container>
    </mat-checkbox>
  }
</div>

<ng-template #optionContent>
  <div class="option-wrapper" (click)="onContentClick($event)">
    <span class="option-text">
      {{ getOptionDisplayText() }}
    </span>

    @if (shouldShowIcon(binding().option, displayIndex())) {
      <mat-icon class="opt-icon">
        {{ getOptionIcon(binding().option, displayIndex()) }}
      </mat-icon>
    }
  </div>
</ng-template>
