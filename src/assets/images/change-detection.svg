<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 460" role="img"
     aria-label="Angular change detection traversing the component tree from root to leaves">
  <defs>
    <marker id="cd-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7"
            markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#dd0031"/>
    </marker>
    <style>
      .box   { fill:#ffffff; stroke:#dd0031; stroke-width:2.5; }
      .root  { fill:#dd0031; }
      .lbl   { font-family:'Segoe UI',Roboto,Arial,sans-serif; font-size:16px;
               text-anchor:middle; dominant-baseline:middle; }
      .lbl-w { fill:#ffffff; font-weight:600; }
      .lbl-d { fill:#3d3d3d; font-weight:600; }
      .flow  { stroke:#dd0031; stroke-width:2.5; fill:none; }
      .title { font-family:'Segoe UI',Roboto,Arial,sans-serif; font-weight:700;
               fill:#1a1a1a; font-size:22px; text-anchor:middle; }
      .sub   { font-family:'Segoe UI',Roboto,Arial,sans-serif; fill:#6b6b6b;
               font-size:13px; text-anchor:middle; }
    </style>
  </defs>

  <rect x="0" y="0" width="620" height="460" fill="#fafafa"/>

  <!-- Title -->
  <text class="title" x="310" y="36">Angular Change Detection</text>
  <text class="sub"   x="310" y="58">Traversal flows top-down: Root &#8594; Child &#8594; Leaf</text>

  <!-- Root -->
  <rect class="box root" x="240" y="86" width="140" height="52" rx="12"/>
  <text class="lbl lbl-w" x="310" y="113">Root</text>

  <!-- Children -->
  <rect class="box" x="110" y="200" width="140" height="52" rx="12"/>
  <text class="lbl lbl-d" x="180" y="227">Child</text>

  <rect class="box" x="370" y="200" width="140" height="52" rx="12"/>
  <text class="lbl lbl-d" x="440" y="227">Child</text>

  <!-- Leaves -->
  <rect class="box" x="40"  y="330" width="120" height="50" rx="12"/>
  <text class="lbl lbl-d" x="100" y="356">Leaf</text>

  <rect class="box" x="200" y="330" width="120" height="50" rx="12"/>
  <text class="lbl lbl-d" x="260" y="356">Leaf</text>

  <rect class="box" x="360" y="330" width="120" height="50" rx="12"/>
  <text class="lbl lbl-d" x="420" y="356">Leaf</text>

  <rect class="box" x="480" y="330" width="120" height="50" rx="12"/>
  <text class="lbl lbl-d" x="540" y="356">Leaf</text>

  <!-- Root -> Children -->
  <path class="flow" marker-end="url(#cd-arrow)" d="M310 138 C310 168, 180 168, 180 198"/>
  <path class="flow" marker-end="url(#cd-arrow)" d="M310 138 C310 168, 440 168, 440 198"/>

  <!-- Left child -> its leaves -->
  <path class="flow" marker-end="url(#cd-arrow)" d="M180 252 C180 292, 100 292, 100 328"/>
  <path class="flow" marker-end="url(#cd-arrow)" d="M180 252 C180 292, 260 292, 260 328"/>

  <!-- Right child -> its leaves -->
  <path class="flow" marker-end="url(#cd-arrow)" d="M440 252 C440 292, 420 292, 420 328"/>
  <path class="flow" marker-end="url(#cd-arrow)" d="M440 252 C440 292, 540 292, 540 328"/>
</svg>
